<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legal Bridge Local App</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-kicker">Local Module</div>
          <h1>Legal Bridge</h1>
          <p>Backlog と Slack をつないで文書作成を回すローカルアプリ</p>
        </div>
        <div class="actions">
          <button id="run-poller">ポーリング実行</button>
          <button id="run-approval-reminder" class="secondary">承認リマインド</button>
          <button id="run-stamp-reminder" class="secondary">押印リマインド</button>
          <button id="test-backlog" class="secondary">Backlog接続テスト</button>
          <button id="test-cloudsign" class="secondary">CloudSign接続テスト</button>
          <button id="show-backlog-setup" class="secondary">Backlog設定確認</button>
          <button id="test-slack" class="secondary">Slack接続テスト</button>
          <button id="sync-cloudsign" class="secondary">CloudSign同期</button>
          <button id="validate-templates" class="secondary">Template検証</button>
          <button id="add-sample" class="secondary">サンプル課題追加</button>
        </div>
        <div class="config">
          <h2>設定</h2>
          <form id="config-form">
            <label>Backlog Space<input name="backlogSpace" /></label>
            <label>Project ID<input name="backlogProjectId" /></label>
            <label>Slack Channel<input name="legalSlackChannel" /></label>
            <label>Approver Slack ID<input name="approverSlackId" /></label>
            <label>Drive Folder ID<input name="driveRootFolderId" /></label>
            <label>Polling Interval<input name="pollingIntervalSec" type="number" min="5" /></label>
            <button type="submit">保存</button>
          </form>
        </div>
        <div class="config">
          <h2>Template追加</h2>
          <form id="template-form">
            <label>Definition ID<input name="id" placeholder="service_basic" /></label>
            <label>Template File<input name="templateFile" placeholder="template_service_basic.html" /></label>
            <label>Document Name<input name="documentName" placeholder="業務委託基本契約書" /></label>
            <label>Issue Types<input name="issueTypes" placeholder="業務委託, 基本契約" /></label>
            <label>Prefix
              <select name="contractNoPrefix">
                <option value="C">C</option>
                <option value="PO">PO</option>
                <option value="LIC">LIC</option>
              </select>
            </label>
            <label>Notes<input name="notes" placeholder="補足メモ" /></label>
            <button type="submit">Definition追加</button>
          </form>
        </div>
      </aside>
      <main class="content">
        <section class="hero">
          <div>
            <div class="eyebrow">Admin UI</div>
            <h2 id="app-title">Legal Bridge Local App</h2>
            <p>Backlog の課題同期、文書生成、Slack 通知、テンプレート定義の状態をローカル PC から確認します。</p>
          </div>
          <div class="health-grid" id="health-grid"></div>
        </section>

        <section class="panel">
          <div id="flash" class="flash flash-ok">準備完了</div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h3>Backlog設定チェック</h3>
          </div>
          <pre id="backlog-setup-checklist" class="stack-item checklist">未取得</pre>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h3>Template定義</h3>
            <span id="template-definition-count"></span>
          </div>
          <div id="template-definitions" class="card-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h3>CSV一括発注書</h3>
          </div>
          <form id="bulk-order-form" class="bulk-order-form">
            <label>CSV File<input id="bulk-order-file" name="bulkOrderFile" type="file" accept=".csv,text/csv" /></label>
            <label>CSV Text<textarea id="bulk-order-text" name="csvText" rows="8" placeholder="vendor_name,project_title,delivery_date,unit_price,quantity,description,payment_terms,notes,has_base_contract"></textarea></label>
            <label>Output Mode
              <select name="outputMode">
                <option value="individual">個別PDF</option>
                <option value="merged">合冊PDF</option>
                <option value="both">両方</option>
              </select>
            </label>
            <label class="checkbox-row"><input type="checkbox" name="previewOnly" /> Preview only</label>
            <label class="checkbox-row"><input type="checkbox" name="notifySlack" /> Slack通知</label>
            <label class="checkbox-row"><input type="checkbox" name="createBacklogIssues" /> Backlog課題作成（未対応）</label>
            <div class="inline-actions">
              <button type="submit">取込実行</button>
            </div>
          </form>
          <div id="bulk-order-result" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h3>課題一覧</h3>
            <span id="issue-count"></span>
          </div>
          <div id="issues" class="card-grid"></div>
        </section>

        <section class="panel dual">
          <div>
            <div class="panel-head">
              <h3>契約台帳</h3>
            </div>
            <div id="contracts" class="stack"></div>
          </div>
          <div>
            <div class="panel-head">
              <h3>納品台帳</h3>
            </div>
            <div id="deliveries" class="stack"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h3>ポーリングログ</h3>
          </div>
          <div id="polling-logs" class="stack"></div>
        </section>

        <section class="panel dual">
          <div>
            <div class="panel-head">
              <h3>生成済み文書</h3>
            </div>
            <div id="documents" class="stack"></div>
          </div>
          <div>
            <div class="panel-head">
              <h3>イベントログ</h3>
            </div>
            <div id="events" class="stack"></div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
